<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            text-align: center;
        }

        h1 {
            font-size: 72px;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 20px;
        }

        .scores {
            display: flex;
            gap: 10px;
        }

        .score-box {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            border-radius: 8px;
            padding: 10px 25px;
            color: #fff;
        }

        .score-box .label {
            font-size: 12px;
            text-transform: uppercase;
            opacity: 0.8;
        }

        .score-box .value {
            font-size: 28px;
            font-weight: bold;
        }

        .new-game-btn {
            background: #f65e3b;
            color: #fff;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .new-game-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        .new-game-btn:active {
            transform: translateY(0);
        }

        .game-container {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 15px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            background: rgba(0,0,0,0.1);
            border-radius: 12px;
            padding: 12px;
        }

        .cell {
            width: 100px;
            height: 100px;
            background: rgba(255,255,255,0.2);
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 36px;
            font-weight: bold;
            color: #fff;
            transition: transform 0.15s ease-out;
            position: relative;
        }

        .cell[data-value="2"] { background: #eee4da; color: #776e65; }
        .cell[data-value="4"] { background: #ede0c8; color: #776e65; }
        .cell[data-value="8"] { background: #f2b179; color: #fff; }
        .cell[data-value="16"] { background: #f59563; color: #fff; }
        .cell[data-value="32"] { background: #f67c5f; color: #fff; }
        .cell[data-value="64"] { background: #f65e3b; color: #fff; }
        .cell[data-value="128"] { background: #edcf72; color: #fff; font-size: 32px; }
        .cell[data-value="256"] { background: #edcc61; color: #fff; font-size: 32px; }
        .cell[data-value="512"] { background: #edc850; color: #fff; font-size: 32px; }
        .cell[data-value="1024"] { background: #edc53f; color: #fff; font-size: 26px; }
        .cell[data-value="2048"] { background: #edc22e; color: #fff; font-size: 26px; }
        .cell[data-value="4096"] { background: #3c3a32; color: #fff; font-size: 26px; }
        .cell[data-value="8192"] { background: #3c3a32; color: #fff; font-size: 26px; }

        .cell.new {
            animation: appear 0.2s ease-out;
        }

        .cell.merged {
            animation: pop 0.2s ease-out;
        }

        @keyframes appear {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .message {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .message.show {
            opacity: 1;
            pointer-events: auto;
        }

        .message h2 {
            font-size: 48px;
            color: #fff;
            margin-bottom: 20px;
        }

        .message p {
            color: rgba(255,255,255,0.8);
            margin-bottom: 30px;
            font-size: 18px;
        }

        .instructions {
            margin-top: 20px;
            color: rgba(255,255,255,0.7);
            font-size: 14px;
        }

        .instructions kbd {
            background: rgba(255,255,255,0.2);
            padding: 4px 8px;
            border-radius: 4px;
            margin: 0 2px;
        }

        @media (max-width: 500px) {
            h1 { font-size: 48px; }
            .cell { width: 70px; height: 70px; font-size: 24px; }
            .cell[data-value="128"],
            .cell[data-value="256"],
            .cell[data-value="512"] { font-size: 22px; }
            .cell[data-value="1024"],
            .cell[data-value="2048"],
            .cell[data-value="4096"],
            .cell[data-value="8192"] { font-size: 18px; }
            .header { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>2048</h1>
        <div class="header">
            <div class="scores">
                <div class="score-box">
                    <div class="label">Score</div>
                    <div class="value" id="score">0</div>
                </div>
                <div class="score-box">
                    <div class="label">Best</div>
                    <div class="value" id="best">0</div>
                </div>
            </div>
            <button class="new-game-btn" onclick="newGame()">New Game</button>
        </div>
        <div class="game-container">
            <div class="grid" id="grid"></div>
        </div>
        <p class="instructions">
            Use <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> or <kbd>W</kbd> <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd> to move tiles
        </p>
    </div>

    <div class="message" id="message">
        <h2 id="message-title">Game Over!</h2>
        <p id="message-text">No more moves available</p>
        <button class="new-game-btn" onclick="newGame()">Try Again</button>
    </div>

    <script>
        const SIZE = 4;
        let grid = [];
        let score = 0;
        let best = parseInt(localStorage.getItem('2048-best')) || 0;
        let gameOver = false;

        function init() {
            document.getElementById('best').textContent = best;
            newGame();
        }

        function newGame() {
            grid = Array(SIZE).fill(null).map(() => Array(SIZE).fill(0));
            score = 0;
            gameOver = false;
            document.getElementById('score').textContent = score;
            document.getElementById('message').classList.remove('show');
            addRandomTile();
            addRandomTile();
            render();
        }

        function addRandomTile() {
            const emptyCells = [];
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    if (grid[r][c] === 0) emptyCells.push({r, c});
                }
            }
            if (emptyCells.length === 0) return false;
            const {r, c} = emptyCells[Math.floor(Math.random() * emptyCells.length)];
            grid[r][c] = Math.random() < 0.9 ? 2 : 4;
            return {r, c};
        }

        function render(newTile = null, mergedCells = []) {
            const gridEl = document.getElementById('grid');
            gridEl.innerHTML = '';
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    const value = grid[r][c];
                    if (value > 0) {
                        cell.textContent = value;
                        cell.setAttribute('data-value', value);
                        if (newTile && newTile.r === r && newTile.c === c) {
                            cell.classList.add('new');
                        }
                        if (mergedCells.some(m => m.r === r && m.c === c)) {
                            cell.classList.add('merged');
                        }
                    }
                    gridEl.appendChild(cell);
                }
            }
        }

        function slide(row) {
            let arr = row.filter(x => x !== 0);
            const merged = [];
            for (let i = 0; i < arr.length - 1; i++) {
                if (arr[i] === arr[i + 1]) {
                    arr[i] *= 2;
                    score += arr[i];
                    merged.push(i);
                    arr.splice(i + 1, 1);
                }
            }
            while (arr.length < SIZE) arr.push(0);
            return {row: arr, merged};
        }

        function rotateGrid(times) {
            for (let t = 0; t < times; t++) {
                const newGrid = Array(SIZE).fill(null).map(() => Array(SIZE).fill(0));
                for (let r = 0; r < SIZE; r++) {
                    for (let c = 0; c < SIZE; c++) {
                        newGrid[c][SIZE - 1 - r] = grid[r][c];
                    }
                }
                grid = newGrid;
            }
        }

        function move(direction) {
            if (gameOver) return;

            const rotations = {left: 0, up: 1, right: 2, down: 3};
            const rot = rotations[direction];

            rotateGrid(rot);

            let moved = false;
            const mergedCells = [];

            for (let r = 0; r < SIZE; r++) {
                const oldRow = [...grid[r]];
                const result = slide(grid[r]);
                grid[r] = result.row;
                if (oldRow.join(',') !== grid[r].join(',')) moved = true;
                result.merged.forEach(c => {
                    let actualR = r, actualC = c;
                    for (let i = 0; i < (4 - rot) % 4; i++) {
                        const temp = actualR;
                        actualR = actualC;
                        actualC = SIZE - 1 - temp;
                    }
                    mergedCells.push({r: actualR, c: actualC});
                });
            }

            rotateGrid((4 - rot) % 4);

            if (moved) {
                const newTile = addRandomTile();
                document.getElementById('score').textContent = score;
                if (score > best) {
                    best = score;
                    localStorage.setItem('2048-best', best);
                    document.getElementById('best').textContent = best;
                }
                render(newTile, mergedCells);

                if (!canMove()) {
                    gameOver = true;
                    setTimeout(() => {
                        if (hasWon()) {
                            document.getElementById('message-title').textContent = 'You Win!';
                            document.getElementById('message-text').textContent = 'You reached 2048!';
                        } else {
                            document.getElementById('message-title').textContent = 'Game Over!';
                            document.getElementById('message-text').textContent = 'No more moves available';
                        }
                        document.getElementById('message').classList.add('show');
                    }, 300);
                }
            }
        }

        function hasWon() {
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    if (grid[r][c] >= 2048) return true;
                }
            }
            return false;
        }

        function canMove() {
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    if (grid[r][c] === 0) return true;
                    if (c < SIZE - 1 && grid[r][c] === grid[r][c + 1]) return true;
                    if (r < SIZE - 1 && grid[r][c] === grid[r + 1][c]) return true;
                }
            }
            return false;
        }

        document.addEventListener('keydown', (e) => {
            const keyMap = {
                'ArrowLeft': 'left', 'ArrowRight': 'right', 'ArrowUp': 'up', 'ArrowDown': 'down',
                'a': 'left', 'd': 'right', 'w': 'up', 's': 'down',
                'A': 'left', 'D': 'right', 'W': 'up', 'S': 'down'
            };
            if (keyMap[e.key]) {
                e.preventDefault();
                move(keyMap[e.key]);
            }
        });

        let touchStartX, touchStartY;
        document.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });

        document.addEventListener('touchend', (e) => {
            if (!touchStartX || !touchStartY) return;
            const dx = e.changedTouches[0].clientX - touchStartX;
            const dy = e.changedTouches[0].clientY - touchStartY;
            const absDx = Math.abs(dx);
            const absDy = Math.abs(dy);

            if (Math.max(absDx, absDy) > 30) {
                if (absDx > absDy) {
                    move(dx > 0 ? 'right' : 'left');
                } else {
                    move(dy > 0 ? 'down' : 'up');
                }
            }
            touchStartX = touchStartY = null;
        });

        init();
    </script>
</body>
</html>

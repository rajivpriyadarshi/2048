<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 - Hand Drawn</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&family=Patrick+Hand&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fdfbf7;
            --fg: #2d2d2d;
            --muted: #e5e0d8;
            --accent: #ff4d4d;
            --border: #2d2d2d;
            --blue: #2d5da1;
            --postit: #fff9c4;
            --wobbly: 255px 15px 225px 15px / 15px 225px 15px 255px;
            --wobbly-md: 95px 25px 105px 25px / 25px 105px 25px 95px;
            --wobbly-sm: 45px 15px 55px 12px / 12px 55px 15px 45px;
            --wobbly-cell: 35px 8px 42px 10px / 10px 42px 8px 35px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Patrick Hand', cursive;
            background-color: var(--bg);
            background-image: radial-gradient(var(--muted) 1px, transparent 1px);
            background-size: 24px 24px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: var(--fg);
        }

        .container {
            text-align: center;
            position: relative;
        }

        h1 {
            font-family: 'Kalam', cursive;
            font-size: 72px;
            font-weight: 700;
            color: var(--fg);
            margin-bottom: 20px;
            transform: rotate(-2deg);
            position: relative;
            display: inline-block;
        }

        h1::after {
            content: '!';
            color: var(--accent);
            display: inline-block;
            animation: wiggle 0.5s ease-in-out infinite alternate;
        }

        @keyframes wiggle {
            from { transform: rotate(-5deg); }
            to { transform: rotate(5deg); }
        }

        .header {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            gap: 15px;
            flex-wrap: wrap;
        }

        .scores {
            display: flex;
            gap: 12px;
        }

        .score-box {
            background: #fff;
            border: 3px solid var(--border);
            border-radius: var(--wobbly-sm);
            padding: 8px 20px;
            box-shadow: 4px 4px 0px 0px var(--border);
            transform: rotate(1deg);
            transition: transform 0.1s;
        }

        .score-box:nth-child(2) {
            transform: rotate(-1deg);
            background: var(--postit);
        }

        .score-box:hover {
            transform: rotate(0deg) scale(1.02);
        }

        .score-box .label {
            font-family: 'Patrick Hand', cursive;
            font-size: 14px;
            text-transform: uppercase;
            color: var(--fg);
            opacity: 0.7;
        }

        .score-box .value {
            font-family: 'Kalam', cursive;
            font-size: 28px;
            font-weight: 700;
        }

        .new-game-btn {
            background: #fff;
            color: var(--fg);
            border: 3px solid var(--border);
            padding: 12px 28px;
            font-family: 'Patrick Hand', cursive;
            font-size: 20px;
            border-radius: var(--wobbly-sm);
            cursor: pointer;
            box-shadow: 4px 4px 0px 0px var(--border);
            transition: all 0.1s;
            transform: rotate(-1deg);
        }

        .new-game-btn:hover {
            background: var(--accent);
            color: #fff;
            box-shadow: 2px 2px 0px 0px var(--border);
            transform: rotate(0deg) translate(2px, 2px);
        }

        .new-game-btn:active {
            box-shadow: none;
            transform: translate(4px, 4px);
        }

        .game-container {
            background: #fff;
            border: 3px solid var(--border);
            border-radius: var(--wobbly-md);
            padding: 15px;
            box-shadow: 8px 8px 0px 0px var(--border);
            position: relative;
            display: inline-block;
        }

        .tape {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%) rotate(2deg);
            width: 80px;
            height: 24px;
            background: rgba(200, 200, 180, 0.6);
            border-radius: 2px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            background: var(--muted);
            border: 2px dashed var(--border);
            border-radius: var(--wobbly-sm);
            padding: 12px;
        }

        .cell {
            width: 85px;
            height: 85px;
            background: var(--bg);
            border: 2px solid var(--border);
            border-radius: var(--wobbly-cell);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Kalam', cursive;
            font-size: 32px;
            font-weight: 700;
            color: var(--fg);
            transition: transform 0.1s;
            position: relative;
        }

        .cell:empty {
            border-style: dashed;
            border-color: rgba(45, 45, 45, 0.3);
        }

        .cell[data-value="2"] {
            background: #fff;
            box-shadow: 3px 3px 0px 0px rgba(45, 45, 45, 0.2);
        }
        .cell[data-value="4"] {
            background: var(--muted);
            box-shadow: 3px 3px 0px 0px rgba(45, 45, 45, 0.25);
        }
        .cell[data-value="8"] {
            background: #ffd699;
            box-shadow: 3px 3px 0px 0px rgba(45, 45, 45, 0.3);
        }
        .cell[data-value="16"] {
            background: #ffb366;
            box-shadow: 4px 4px 0px 0px rgba(45, 45, 45, 0.35);
        }
        .cell[data-value="32"] {
            background: #ff9966;
            color: #fff;
            box-shadow: 4px 4px 0px 0px var(--border);
        }
        .cell[data-value="64"] {
            background: var(--accent);
            color: #fff;
            box-shadow: 4px 4px 0px 0px var(--border);
            transform: rotate(-1deg);
        }
        .cell[data-value="128"] {
            background: var(--postit);
            font-size: 28px;
            box-shadow: 4px 4px 0px 0px var(--border);
            transform: rotate(1deg);
        }
        .cell[data-value="256"] {
            background: #ffe066;
            font-size: 28px;
            box-shadow: 5px 5px 0px 0px var(--border);
        }
        .cell[data-value="512"] {
            background: #ffd633;
            font-size: 28px;
            box-shadow: 5px 5px 0px 0px var(--border);
            transform: rotate(-1deg);
        }
        .cell[data-value="1024"] {
            background: #ffcc00;
            font-size: 22px;
            box-shadow: 6px 6px 0px 0px var(--border);
        }
        .cell[data-value="2048"] {
            background: var(--blue);
            color: #fff;
            font-size: 22px;
            box-shadow: 6px 6px 0px 0px var(--border);
            animation: winner 0.5s ease-in-out infinite alternate;
        }
        .cell[data-value="4096"],
        .cell[data-value="8192"] {
            background: var(--fg);
            color: #fff;
            font-size: 20px;
            box-shadow: 6px 6px 0px 0px var(--accent);
        }

        @keyframes winner {
            from { transform: rotate(-2deg) scale(1); }
            to { transform: rotate(2deg) scale(1.02); }
        }

        .cell.new {
            animation: appear 0.2s ease-out;
        }

        .cell.merged {
            animation: pop 0.2s ease-out;
        }

        @keyframes appear {
            0% { transform: scale(0) rotate(10deg); opacity: 0; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.15) rotate(-3deg); }
            100% { transform: scale(1) rotate(0deg); }
        }

        .message {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(253, 251, 247, 0.95);
            background-image: radial-gradient(var(--muted) 1px, transparent 1px);
            background-size: 24px 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .message.show {
            opacity: 1;
            pointer-events: auto;
        }

        .message-box {
            background: #fff;
            border: 3px solid var(--border);
            border-radius: var(--wobbly-md);
            padding: 40px 50px;
            box-shadow: 8px 8px 0px 0px var(--border);
            text-align: center;
            transform: rotate(-1deg);
            position: relative;
        }

        .message-box .tack {
            position: absolute;
            top: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 20px;
            background: var(--accent);
            border: 2px solid var(--border);
            border-radius: 50%;
            box-shadow: 2px 2px 0px 0px var(--border);
        }

        .message h2 {
            font-family: 'Kalam', cursive;
            font-size: 48px;
            font-weight: 700;
            color: var(--fg);
            margin-bottom: 10px;
        }

        .message.show .message-box h2.win {
            color: var(--blue);
        }

        .message p {
            font-family: 'Patrick Hand', cursive;
            color: var(--fg);
            margin-bottom: 25px;
            font-size: 20px;
            opacity: 0.8;
        }

        .instructions {
            margin-top: 25px;
            color: var(--fg);
            font-size: 16px;
            opacity: 0.7;
        }

        .instructions kbd {
            background: #fff;
            border: 2px solid var(--border);
            padding: 4px 10px;
            border-radius: 8px 4px 10px 5px / 5px 10px 4px 8px;
            margin: 0 2px;
            font-family: 'Kalam', cursive;
            font-weight: 700;
            box-shadow: 2px 2px 0px 0px var(--border);
            display: inline-block;
        }

        .doodle {
            position: absolute;
            pointer-events: none;
        }

        .doodle-arrow {
            top: 20px;
            right: -80px;
            width: 60px;
            height: 40px;
        }

        .doodle-star {
            bottom: 60px;
            left: -50px;
            font-size: 32px;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0) rotate(-10deg); }
            50% { transform: translateY(-10px) rotate(10deg); }
        }

        @media (max-width: 500px) {
            h1 { font-size: 48px; }
            .cell {
                width: 65px;
                height: 65px;
                font-size: 24px;
            }
            .cell[data-value="128"],
            .cell[data-value="256"],
            .cell[data-value="512"] { font-size: 20px; }
            .cell[data-value="1024"],
            .cell[data-value="2048"],
            .cell[data-value="4096"],
            .cell[data-value="8192"] { font-size: 16px; }
            .header {
                flex-direction: column;
                gap: 12px;
            }
            .game-container {
                box-shadow: 6px 6px 0px 0px var(--border);
            }
            .grid {
                gap: 8px;
                padding: 10px;
            }
            .score-box {
                padding: 6px 16px;
            }
            .score-box .value {
                font-size: 24px;
            }
            .doodle {
                display: none;
            }
            .instructions kbd {
                padding: 3px 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>2048</h1>

        <svg class="doodle doodle-arrow" viewBox="0 0 60 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M5 20 Q30 5, 50 20" stroke="#2d2d2d" stroke-width="2" stroke-dasharray="4 3" fill="none"/>
            <path d="M45 15 L52 20 L45 25" stroke="#2d2d2d" stroke-width="2" fill="none"/>
        </svg>
        <div class="doodle doodle-star">✨</div>

        <div class="header">
            <div class="scores">
                <div class="score-box">
                    <div class="label">Score</div>
                    <div class="value" id="score">0</div>
                </div>
                <div class="score-box">
                    <div class="label">Best</div>
                    <div class="value" id="best">0</div>
                </div>
            </div>
            <button class="new-game-btn" onclick="newGame()">New Game</button>
        </div>
        <div class="game-container">
            <div class="tape"></div>
            <div class="grid" id="grid"></div>
        </div>
        <p class="instructions">
            Use <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> or <kbd>W</kbd> <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd> to move
        </p>
    </div>

    <div class="message" id="message">
        <div class="message-box">
            <div class="tack"></div>
            <h2 id="message-title">Game Over!</h2>
            <p id="message-text">No more moves available</p>
            <button class="new-game-btn" onclick="newGame()">Try Again</button>
        </div>
    </div>

    <script>
        const SIZE = 4;
        let grid = [];
        let score = 0;
        let best = parseInt(localStorage.getItem('2048-best')) || 0;
        let gameOver = false;

        // Sound effects using Web Audio API
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) audioCtx = new AudioContext();
        }

        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (type === 'move') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(220, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(180, audioCtx.currentTime + 0.08);
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.08);
            } else if (type === 'merge') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(440, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.12);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.15);
            } else if (type === 'gameover') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(200, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.4);
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.4);
            } else if (type === 'win') {
                [523, 659, 784, 1047].forEach((freq, i) => {
                    const o = audioCtx.createOscillator();
                    const g = audioCtx.createGain();
                    o.connect(g);
                    g.connect(audioCtx.destination);
                    o.type = 'sine';
                    o.frequency.value = freq;
                    g.gain.setValueAtTime(0.15, audioCtx.currentTime + i * 0.12);
                    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.12 + 0.2);
                    o.start(audioCtx.currentTime + i * 0.12);
                    o.stop(audioCtx.currentTime + i * 0.12 + 0.2);
                });
            }
        }

        function init() {
            document.getElementById('best').textContent = best;
            newGame();
        }

        function newGame() {
            grid = Array(SIZE).fill(null).map(() => Array(SIZE).fill(0));
            score = 0;
            gameOver = false;
            document.getElementById('score').textContent = score;
            document.getElementById('message').classList.remove('show');
            addRandomTile();
            addRandomTile();
            render();
        }

        function addRandomTile() {
            const emptyCells = [];
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    if (grid[r][c] === 0) emptyCells.push({r, c});
                }
            }
            if (emptyCells.length === 0) return false;
            const {r, c} = emptyCells[Math.floor(Math.random() * emptyCells.length)];
            grid[r][c] = Math.random() < 0.9 ? 2 : 4;
            return {r, c};
        }

        function render(newTile = null, mergedCells = []) {
            const gridEl = document.getElementById('grid');
            gridEl.innerHTML = '';
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    const value = grid[r][c];
                    if (value > 0) {
                        cell.textContent = value;
                        cell.setAttribute('data-value', value);
                        if (newTile && newTile.r === r && newTile.c === c) {
                            cell.classList.add('new');
                        }
                        if (mergedCells.some(m => m.r === r && m.c === c)) {
                            cell.classList.add('merged');
                        }
                    }
                    gridEl.appendChild(cell);
                }
            }
        }

        function slide(row) {
            let arr = row.filter(x => x !== 0);
            const merged = [];
            for (let i = 0; i < arr.length - 1; i++) {
                if (arr[i] === arr[i + 1]) {
                    arr[i] *= 2;
                    score += arr[i];
                    merged.push(i);
                    arr.splice(i + 1, 1);
                }
            }
            while (arr.length < SIZE) arr.push(0);
            return {row: arr, merged};
        }

        function rotateGrid(times) {
            for (let t = 0; t < times; t++) {
                const newGrid = Array(SIZE).fill(null).map(() => Array(SIZE).fill(0));
                for (let r = 0; r < SIZE; r++) {
                    for (let c = 0; c < SIZE; c++) {
                        newGrid[c][SIZE - 1 - r] = grid[r][c];
                    }
                }
                grid = newGrid;
            }
        }

        function move(direction) {
            if (gameOver) return;

            const rotations = {left: 0, up: 3, right: 2, down: 1};
            const rot = rotations[direction];

            rotateGrid(rot);

            let moved = false;
            const mergedCells = [];

            for (let r = 0; r < SIZE; r++) {
                const oldRow = [...grid[r]];
                const result = slide(grid[r]);
                grid[r] = result.row;
                if (oldRow.join(',') !== grid[r].join(',')) moved = true;
                result.merged.forEach(c => {
                    let actualR = r, actualC = c;
                    for (let i = 0; i < (4 - rot) % 4; i++) {
                        const temp = actualR;
                        actualR = actualC;
                        actualC = SIZE - 1 - temp;
                    }
                    mergedCells.push({r: actualR, c: actualC});
                });
            }

            rotateGrid((4 - rot) % 4);

            if (moved) {
                if (mergedCells.length > 0) {
                    playSound('merge');
                } else {
                    playSound('move');
                }
                const newTile = addRandomTile();
                document.getElementById('score').textContent = score;
                if (score > best) {
                    best = score;
                    localStorage.setItem('2048-best', best);
                    document.getElementById('best').textContent = best;
                }
                render(newTile, mergedCells);

                if (!canMove()) {
                    gameOver = true;
                    setTimeout(() => {
                        const titleEl = document.getElementById('message-title');
                        if (hasWon()) {
                            titleEl.textContent = 'You Win!';
                            titleEl.classList.add('win');
                            document.getElementById('message-text').textContent = 'You reached 2048!';
                            playSound('win');
                        } else {
                            titleEl.textContent = 'Game Over!';
                            titleEl.classList.remove('win');
                            document.getElementById('message-text').textContent = 'No more moves available';
                            playSound('gameover');
                        }
                        document.getElementById('message').classList.add('show');
                    }, 300);
                }
            }
        }

        function hasWon() {
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    if (grid[r][c] >= 2048) return true;
                }
            }
            return false;
        }

        function canMove() {
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    if (grid[r][c] === 0) return true;
                    if (c < SIZE - 1 && grid[r][c] === grid[r][c + 1]) return true;
                    if (r < SIZE - 1 && grid[r][c] === grid[r + 1][c]) return true;
                }
            }
            return false;
        }

        document.addEventListener('keydown', (e) => {
            const keyMap = {
                'ArrowLeft': 'left', 'ArrowRight': 'right', 'ArrowUp': 'up', 'ArrowDown': 'down',
                'a': 'left', 'd': 'right', 'w': 'up', 's': 'down',
                'A': 'left', 'D': 'right', 'W': 'up', 'S': 'down'
            };
            if (keyMap[e.key]) {
                e.preventDefault();
                initAudio();
                move(keyMap[e.key]);
            }
        });

        let touchStartX, touchStartY;
        document.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });

        document.addEventListener('touchend', (e) => {
            if (!touchStartX || !touchStartY) return;
            const dx = e.changedTouches[0].clientX - touchStartX;
            const dy = e.changedTouches[0].clientY - touchStartY;
            const absDx = Math.abs(dx);
            const absDy = Math.abs(dy);

            if (Math.max(absDx, absDy) > 30) {
                initAudio();
                if (absDx > absDy) {
                    move(dx > 0 ? 'right' : 'left');
                } else {
                    move(dy > 0 ? 'down' : 'up');
                }
            }
            touchStartX = touchStartY = null;
        });

        init();
    </script>
</body>
</html>
